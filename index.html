<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ĀDI — An interactive cinematic journey through 13.8 billion years of creation. From the singularity to the future, witness the birth of everything." />
  <title>ĀDI — From Nothing. To Everything.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/adi-style.css">
</head>
<body>

  <!-- Scroll driver -->
  <div id="scroll-container">
    <div id="scroll-spacer"></div>
  </div>

  <!-- WebGL Canvas -->
  <canvas id="canvas"></canvas>

  <!-- Clean Minimal Loader -->
  <div id="loader">
    <div id="loader-title">ĀDI</div>
    <div id="loader-subtitle">FROM NOTHING. TO EVERYTHING.</div>
    <div id="loader-hint">Click to initiate</div>
  </div>

  <!-- UI Overlay -->
  <div id="ui-overlay">

    <!-- Brand -->
    <div id="brand">
      <div id="brand-name">ĀDI</div>
      <div id="brand-tag">FROM NOTHING. TO EVERYTHING.</div>
    </div>

    <!-- Year counter -->
    <div id="year-counter">
      <div id="year-value">13.8 BYA</div>
    </div>

    <!-- Era display -->
    <div id="era-display">
      <div id="era-title">THE VOID</div>
      <div id="era-subtitle">Before time. Before space.</div>
    </div>

    <!-- Scroll hint -->
    <div id="scroll-hint">
      <div class="scroll-hint-text">Scroll to witness</div>
      <div class="scroll-hint-arrow"></div>
    </div>

    <!-- Timeline -->
    <div id="timeline">
      <!-- JS generates dots + lines -->
    </div>

    <!-- Final message -->
    <div id="final-message">
      <div id="final-quote">"Evolution never ended.<br>You are standing on its latest chapter."</div>
      <div id="final-sub">— ĀDI · FROM NOTHING. TO EVERYTHING.</div>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
